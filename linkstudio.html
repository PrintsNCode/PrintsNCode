<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Link Studio · editor link-in-bio</title>
<style>
:root{--bg:#0b0e13;--pan:#121722;--pan2:#0e131c;--line:#222b3a;--tx:#e7edf5;--mut:#8a97ab;--acc:#ff7a3c;--acc2:#ffb17a;--dng:#ff5d5d;--in:#0a0e15;--card:#0d1119;--card2:#141a26;--stage:#141b2a;--codetx:#bfe3c0}
:root[data-theme=light]{--bg:#eef1f6;--pan:#ffffff;--pan2:#f5f7fb;--line:#d8dee9;--tx:#17202e;--mut:#5d6b82;--in:#ffffff;--card:#f8fafc;--card2:#e9eef6;--stage:#dfe6f1;--codetx:#166534}
@media(prefers-color-scheme:light){:root:not([data-theme=dark]):not([data-theme=light]){--bg:#eef1f6;--pan:#ffffff;--pan2:#f5f7fb;--line:#d8dee9;--tx:#17202e;--mut:#5d6b82;--in:#ffffff;--card:#f8fafc;--card2:#e9eef6;--stage:#dfe6f1;--codetx:#166534}}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--tx);font:14px/1.45 system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;display:flex;flex-direction:column;overflow:hidden}
.top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:10px 16px;border-bottom:1px solid var(--line);background:var(--pan)}
.brand{display:flex;align-items:baseline;gap:8px;font-size:17px}
.brand b{letter-spacing:.3px}
.brand span{font-size:12px;color:var(--mut)}
.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.saved{font-size:12px;color:var(--mut);opacity:0;transition:.35s}
.saved.on{opacity:1}
button{font:inherit;color:var(--tx);background:var(--pan2);border:1px solid var(--line);border-radius:8px;padding:7px 12px;cursor:pointer}
button:hover{border-color:#33405a}
button.acc{background:var(--acc);border-color:var(--acc);color:#16100b;font-weight:700}
button.acc:hover{background:var(--acc2)}
main{flex:1;display:grid;grid-template-columns:410px 1fr;min-height:0}
.panel{border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0;background:var(--pan)}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px 10px 6px}
.tabs button{padding:8px 4px;font-weight:600;color:var(--mut);background:transparent;border:1px solid transparent}
.tabs button.on{color:var(--tx);background:var(--pan2);border-color:var(--line)}
.tab{display:none;overflow-y:auto;padding:2px 14px 40px;flex:1}
.tab.on{display:block}
.grp{margin-top:14px;border:1px solid var(--line);border-radius:12px;padding:12px;background:var(--pan2)}
.gtit{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);margin-bottom:8px}
.field{margin:10px 0}
.field>label{display:block;font-size:12px;color:var(--mut);margin-bottom:5px}
input[type=text],input[type=number],textarea,select{width:100%;background:var(--in);border:1px solid var(--line);border-radius:8px;color:var(--tx);padding:8px 10px;font:inherit}
textarea{min-height:64px;resize:vertical}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--acc)}
.rr{display:flex;align-items:center;gap:10px}
.rr input[type=range]{flex:1;accent-color:var(--acc)}
.rr input[type=number]{width:76px;text-align:center}
.rr span{color:var(--mut);font-size:12px;min-width:14px}
.crow{display:flex;gap:8px}
.crow input[type=color]{width:44px;height:36px;padding:2px;border:1px solid var(--line);border-radius:8px;background:var(--in);cursor:pointer}
.crow input[type=text]{width:120px}
.imgrow{display:flex;align-items:center;gap:8px}
.imgth{width:44px;height:44px;border-radius:8px;border:1px dashed var(--line);background-color:var(--in);background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;color:var(--mut);font-size:12px;flex:none}
.mini{padding:6px 9px;font-size:12px;border-radius:7px}
.mini.danger,button.danger{color:#ffb3b3;border-color:#5a2a2a}
.mini.danger:hover,button.danger:hover{background:#2a1414;border-color:var(--dng)}
.addbtn{width:100%;margin-top:10px;border-style:dashed;color:var(--acc2)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.slist,.llist{display:flex;flex-direction:column;gap:8px}
.srow{display:flex;gap:8px;align-items:center}
.srow input{flex:1;min-width:0}
.icbtn{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px}
.icbtn.sm{padding:8px;flex:none;min-width:36px;justify-content:center}
.icbtn img{width:18px;height:18px;object-fit:cover;border-radius:4px;display:block}
.card{border:1px solid var(--line);border-radius:10px;padding:10px;background:var(--card)}
.card.drag{opacity:.45}
.card.fold>*:not(.crow2){display:none}
.pick{position:relative}
.cimg{width:22px;height:22px;object-fit:cover;border-radius:5px}
.pdel{position:absolute;top:2px;right:5px;font-size:10px;color:var(--mut);cursor:pointer;padding:2px}
.pdel:hover{color:var(--dng)}
.card.hcard{background:var(--card2)}
.crow2{display:flex;align-items:center;gap:6px}
.handle{color:var(--mut);cursor:grab;padding:0 2px;user-select:none}
.htag{font-weight:800;color:var(--acc);padding:0 6px}
.gtag{font-weight:800;color:#7fd0ff;padding:0 6px}
.sub{margin-top:8px;display:flex;flex-direction:column;gap:8px;padding-left:8px;border-left:2px solid var(--line)}
.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.grow{flex:1;min-width:0}
.urow{margin-top:8px}
.orow{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;align-items:center}
.orow select{width:auto;flex:1;min-width:130px}
.thlab{font-size:12px;color:var(--mut)}
.itg{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--mut);cursor:pointer;user-select:none}
.itg input{accent-color:var(--acc)}
.tgf{display:flex;align-items:center;justify-content:space-between;gap:10px}
.tgf>label{margin:0;color:var(--tx);font-size:13px}
.sw2{position:relative;width:40px;height:22px;flex:none;cursor:pointer}
.sw2 input{position:absolute;opacity:0;inset:0;margin:0;cursor:pointer}
.sw2 .knob{position:absolute;inset:0;background:#26314a;border-radius:20px;transition:.2s}
.sw2 .knob::after{content:"";position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#e7edf5;transition:.2s}
.sw2 input:checked+.knob{background:var(--acc)}
.sw2 input:checked+.knob::after{left:21px}
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.preset{display:flex;flex-direction:column;gap:6px;align-items:center;padding:8px 4px}
.preset .sw{width:100%;height:32px;border-radius:8px;position:relative;border:1px solid var(--line)}
.preset .dot{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:26px;height:10px;border-radius:6px}
.preset i{font-style:normal;font-size:11px;color:var(--mut)}
.big{width:100%;padding:11px;margin-top:8px;font-weight:600}
.hint{font-size:12px;color:var(--mut);line-height:1.55;margin:10px 0 0}
.code{font:12px/1.7 ui-monospace,'Cascadia Code',Consolas,monospace;background:var(--in);border:1px solid var(--line);border-radius:8px;padding:10px 12px;color:var(--codetx);overflow-x:auto}
.stage{display:flex;flex-direction:column;align-items:center;overflow:auto;padding:18px;background:radial-gradient(1100px 600px at 60% -10%,var(--stage),var(--bg))}
.devbar{display:flex;gap:8px;margin-bottom:14px}
.devbar button.on{border-color:var(--acc);color:var(--acc2)}
.device{width:392px;height:calc(100% - 58px);min-height:540px;background:#05070a;border-radius:34px;padding:11px;box-shadow:0 24px 70px rgba(0,0,0,.55),inset 0 0 0 1px #202838;transition:width .25s;flex:none}
.device iframe{width:100%;height:100%;border:0;border-radius:24px;background:#fff}
.device.desk{width:min(1080px,100%);border-radius:14px;padding:8px}
.device.desk iframe{border-radius:8px}
.modal{position:fixed;inset:0;background:rgba(4,6,10,.72);display:none;align-items:center;justify-content:center;z-index:50}
.modal.on{display:flex}
.sheet{width:min(560px,92vw);max-height:80vh;background:var(--pan);border:1px solid var(--line);border-radius:14px;display:flex;flex-direction:column;overflow:hidden}
.mhead{display:flex;gap:8px;padding:12px;border-bottom:1px solid var(--line)}
.mhead input{flex:1}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px;padding:12px;overflow-y:auto}
.pick{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 4px}
.pick i{font-style:normal;font-size:10.5px;color:var(--mut);max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pick:hover{border-color:var(--acc)}
.toast{position:fixed;left:50%;bottom:26px;transform:translate(-50%,12px);background:var(--pan);border:1px solid var(--acc);color:var(--tx);padding:9px 16px;border-radius:10px;opacity:0;transition:.25s;z-index:60;pointer-events:none}
.toast.on{opacity:1;transform:translate(-50%,0)}
@media(max-width:920px){
 body{overflow:auto}
 main{display:block;height:auto}
 .panel{border-right:0;border-bottom:1px solid var(--line)}
 .stage{padding:14px}
 .device{width:100%;max-width:392px;height:640px}
}
</style>
</head>
<body>
<header class="top">
  <div class="brand">🔗 <b>Link Studio</b><span>por PrintsNCode · exporta HTML estático</span></div>
  <div class="actions">
    <span class="saved" id="saved">✓ Guardado</span>
    <button id="btnTheme" title="Tema del editor: auto / claro / oscuro">🌓 Auto</button>
    <button id="btnImport">Importar JSON</button>
    <button id="btnJson">Guardar JSON</button>
    <button class="acc" id="btnHtml">⬇ Exportar HTML</button>
  </div>
</header>
<main>
  <aside class="panel">
    <nav class="tabs">
      <button data-tab="perfil" class="on">Perfil</button>
      <button data-tab="enlaces">Enlaces</button>
      <button data-tab="diseno">Diseño</button>
      <button data-tab="ajustes">Ajustes</button>
    </nav>
    <section id="tab-perfil" class="tab on"></section>
    <section id="tab-enlaces" class="tab"></section>
    <section id="tab-diseno" class="tab"></section>
    <section id="tab-ajustes" class="tab"></section>
  </aside>
  <section class="stage">
    <div class="devbar">
      <button id="devM" class="on">📱 Móvil</button>
      <button id="devD">🖥️ Escritorio</button>
    </div>
    <div class="device" id="device"><iframe id="pv" title="Vista previa"></iframe></div>
  </section>
</main>
<div class="modal" id="picker">
  <div class="sheet">
    <div class="mhead"><input id="pickSearch" type="text" placeholder="Buscar icono…"><button id="pickImg" class="mini">📷 Imagen propia</button><button id="pickClose">✕</button></div>
    <div class="grid" id="pickGrid"></div>
  </div>
</div>
<input type="file" id="fileJson" accept="application/json" hidden>
<script>
(function(){
function show(m){try{var d=document.getElementById('errbar');if(!d){d=document.createElement('div');d.id='errbar';d.style.cssText='position:fixed;left:0;right:0;bottom:0;z-index:9999;background:#7f1d1d;color:#fff;font:12px/1.5 monospace;padding:10px 14px;white-space:pre-wrap;max-height:40vh;overflow:auto';(document.body||document.documentElement).appendChild(d);}d.textContent='ERROR: '+m+'\n(Copia este mensaje y pasamelo para arreglarlo al momento)';}catch(x){}}
window.addEventListener('error',function(ev){show((ev.message||'desconocido')+(ev.lineno?(' | linea '+ev.lineno+':'+(ev.colno||0)):''))});
window.__lfShow=show;
setTimeout(function(){if(!window.__lfOK&&!document.getElementById('errbar')){show('La interfaz no llego a iniciarse. Probablemente estas abriendo el archivo dentro de un visor restringido. Descargalo y abrelo directamente con Chrome/Firefox/Edge, o sirvelo con: python -m http.server');}},2500);
})();
</script>

 for(let i=0;i<dd.length;i+=4){if(dd[i+3]<40)continue;r+=dd[i];g+=dd[i+1];b+=dd[i+2];n++}
 if(!n)return cb('');
 r/=n;g/=n;b/=n;
 const mid=(Math.max(r,g,b)+Math.min(r,g,b))/2,k=1.25,cl=v=>Math.min(255,Math.max(0,Math.round(v)));
 r=cl(mid+(r-mid)*k);g=cl(mid+(g-mid)*k);b=cl(mid+(b-mid)*k);
 const hx=v=>('0'+v.toString(16)).slice(-2);
 cb('#'+hx(r)+hx(g)+hx(b));
}catch(e){cb('')}};img.onerror=()=>cb('');img.src=dataUrl}

function drawItems(host){host.innerHTML='';
 S.items.forEach((it,i)=>{

  card.addEventListener('dragover',e=>{e.preventDefault();if(dragIdx===null||dragIdx===i)return;
   const r=card.getBoundingClientRect();const after=e.clientY>r.top+r.height/2;
   let to=i+(after?1:0);if(dragIdx<to)to--;if(to===dragIdx)return;
   const m=S.items.splice(dragIdx,1)[0];S.items.splice(to,0,m);dragIdx=to;drawItems(host);refresh()});

/* ====== GENERADOR DE LA PÁGINA (vista previa = HTML exportado) ====== */
function buildPage(s){
 const d=s.design,b=d.btn,g=d.grid,p=s.profile;
 const f=FONTS[d.font]||FONTS['Sistema'];
 const fontLink=f.gf?'<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family='+f.gf+'&display=swap" rel="stylesheet">':'';
 const title=esc(s.meta.title||p.name||'Mis enlaces');
 const desc=esc(s.meta.desc||String(p.bio||'').split('\n')[0]||'');
 const fav=(s.meta.favicon&&p.avatar)?'<link rel="icon" href="'+p.avatar+'">':'';
 let bodyBg;
 if(d.bgType==='gradient')bodyBg='background:linear-gradient('+d.bgAngle+'deg,'+d.bg1+','+d.bg2+') fixed;';
 else bodyBg='background:'+d.bg1+';';
 const imgL=(d.bgType==='image'&&d.bgImage)?'body::before{content:"";position:fixed;inset:0;background:url("'+d.bgImage+'") center/cover no-repeat;z-index:-2}body::after{content:"";position:fixed;inset:0;background:rgba(0,0,0,'+((d.overlay||0)/100)+');z-index:-1}':'';
 const ar=p.avatarShape==='circle'?'50%':(p.avatarShape==='rounded'?Math.round(p.avatarSize*.24)+'px':'6px');
 let bs='';
 if(b.style==='fill')bs='background:'+b.bg+';';
 else if(b.style==='outline')bs='background:transparent;border:'+b.borderW+'px solid '+b.border+';';
 else if(b.style==='soft')bs='background:'+b.bg+';box-shadow:0 10px 28px -6px '+hexA(b.shadow,(b.shadowA==null?30:b.shadowA)/100)+';';
 else if(b.style==='hard')bs='background:'+b.bg+';border:'+b.borderW+'px solid '+b.border+';box-shadow:'+b.offset+'px '+b.offset+'px 0 '+b.shadow+';';
 else if(b.style==='glass')bs='background:'+hexA(b.bg,(b.fillOpacity==null?16:b.fillOpacity)/100)+';border:1px solid '+hexA(b.border,.35)+';backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);';
 let hover='';
 if(b.hover==='lift')hover='.lk:hover{transform:translateY(-3px)}';
 else if(b.hover==='scale')hover='.lk:hover{transform:scale(1.03)}';
 else if(b.hover==='glow')hover='.lk:hover{box-shadow:0 0 24px '+hexA(b.shadow,.85)+'}';
 if(b.style==='hard'&&b.hover==='lift')hover='.lk:hover{transform:translate(-2px,-2px);box-shadow:'+(b.offset+2)+'px '+(b.offset+2)+'px 0 '+b.shadow+'}';
 const rv=d.anim?' reveal':'';
 /* --- anclas, menú (chips) y contenido en orden libre --- */
 const used={};
 const slugId=t=>{let x='';try{x=String(t).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}catch(e){x=String(t).toLowerCase()}
  x=x.replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')||'sec';
  if(used[x]!=null){used[x]++;x=x+'-'+used[x]}else{used[x]=0}return 's-'+x};
 const cellsOf=it=>(it.cells||[]).filter(x=>x&&x.active!==false&&(String(x.title||'').trim()||String(x.url||'').trim()));
 const navs=[];const idFor={};
 s.items.forEach(it=>{
  if(it.type==='header'){const idd=slugId(it.title);idFor[it.id]=idd;if(it.showNav!==false&&String(it.title||'').trim())navs.push({t:it.title,id:idd})}
  else if(it.type==='grid'){const idd=slugId(it.title||'grid');idFor[it.id]=idd;if(cellsOf(it).length&&it.showNav!==false&&String(it.title||'').trim())navs.push({t:it.title,id:idd})}
 });
 const chips=(d.chips&&navs.length)?'<nav class="chips'+rv+'">'+navs.map(n=>'<a href="#'+n.id+'">'+esc(n.t)+'</a>').join('')+'</nav>':'';
 /* --- sociales --- */
 const socHtml=s.socials.filter(x=>x.url).map(x=>'<a href="'+esc(normUrl(x.url))+'" target="_blank" rel="noopener" aria-label="'+esc((ICONS[x.icon]||{}).l||x.icon||'red social')+'">'+iconOf(x,d.socialSize)+'</a>').join('');
 const soc2Html=(s.socials2||[]).filter(x=>x.url).map(x=>'<a href="'+esc(normUrl(x.url))+'" target="_blank" rel="noopener" aria-label="'+esc((ICONS[x.icon]||{}).l||x.icon||'red social')+'">'+iconOf(x,d.social2Size||18)+'</a>').join('');
 const soc=(socHtml?'<div class="soc">'+socHtml+'</div>':'')+(soc2Html?'<div class="soc2">'+soc2Html+'</div>':'');
 /* --- contenido: enlaces, secciones y cuadrículas intercalados --- */
 let idx=0;
 const items=s.items.filter(it=>it.type==='header'||it.type==='grid'||it.active!==false).map(it=>{
  const dms=160+(idx++)*70;
  const delay=d.anim?' style="animation-delay:'+dms+'ms"':'';
  if(it.type==='header')return '<div class="sec'+rv+'" id="'+idFor[it.id]+'"'+delay+'>'+esc(it.title)+'</div>';
  if(it.type==='grid'){
   const cells=cellsOf(it);
   if(!cells.length)return '';
   const base=160+(idx-1)*70;
   const inner=cells.map((gi,k)=>{
    const dl2=d.anim?' style="animation-delay:'+(base+40+k*60)+'ms"':'';
    const ic2=gi.iconImg?'<img class="gfull" src="'+gi.iconImg+'" alt="">':iconOf(gi,g.iconSize);
    const lab=(g.labels&&String(gi.title||'').trim())?'<span class="gil">'+esc(gi.title)+'</span>':'';
    return '<a class="gi'+rv+'"'+dl2+' href="'+esc(normUrl(gi.url))+'" target="_blank" rel="noopener"><span class="gic">'+ic2+'</span>'+lab+'</a>'}).join('\n');
   const gTit=String(it.title||'').trim()?'<div class="sec'+rv+'" id="'+idFor[it.id]+'"'+delay+'>'+esc(it.title)+'</div>':'<span id="'+idFor[it.id]+'"></span>';
   return gTit+'\n<div class="gd">\n'+inner+'\n</div>';
  }
  const tgt=it.newTab===false?'':' target="_blank" rel="noopener"';
  const an=(it.anim&&it.anim!=='none')?' an-'+it.anim:'';
  const mode=it.thumb?(it.thumbMode||'side'):'side';
  let cls='lk'+an+rv,inner='';
  const sty=[];if(d.anim)sty.push('animation-delay:'+dms+'ms');
  if(it.fontSize!=null){sty.push('font-size:'+it.fontSize+'px');sty.push('min-height:'+Math.max(32,Math.round(b.height*(it.fontSize/(b.fontSize||16))))+'px')}
  if(it.thumb&&mode==='cover'){
   cls+=' lkcov';
   inner='<img class="thbg" src="'+it.thumb+'" alt=""><span class="thov"></span>';
  }else if(it.thumb){
   const tparts=[];
   if(it.thumbScale!=null)tparts.push('height:calc((100% - 14px)*'+(it.thumbScale/100)+')');
   if(it.thumbShape)tparts.push('border-radius:'+thumbRadius(it.thumbShape,b));
   const tst=tparts.length?' style="'+tparts.join(';')+'"':'';
   inner='<img class="th"'+tst+' src="'+it.thumb+'" alt="">';
   if(mode==='tint'&&it.thumbTint){
    sty.push('background:linear-gradient(135deg,'+it.thumbTint+','+shade(it.thumbTint,-22)+')');
    sty.push('color:'+contrastText(it.thumbTint));
    sty.push('border-color:'+it.thumbTint);
   }
  }else if(it.iconImg||(it.icon&&ICONS[it.icon])){
   inner='<span class="ic">'+iconOf(it,b.iconSize)+'</span>';
  }
  const styAttr=sty.length?' style="'+sty.join(';')+'"':'';
  return '<a class="'+cls+'"'+styAttr+' href="'+esc(normUrl(it.url))+'"'+tgt+'>'+inner+'<span class="tt">'+esc(it.title)+'</span></a>';
 }).join('\n');
 const shapeR=g.shape==='circle'?'50%':(g.shape==='square'?'10px':'22px');
 /* --- cabecera y pie --- */
 const bn=d.banner||{};
 const hasBn=!!bn.img;
 const bnHtml=hasBn?('<div class="bn"'+(bn.fadeScroll?' id="lfBn"':'')+'><img src="'+bn.img+'" alt="">'+((bn.overlay||0)>0?'<span class="bno"></span>':'')+'</div>'):'';
 const avat=p.avatar?'<img class="av" src="'+p.avatar+'" alt="'+esc(p.name)+'">':'<div class="av ph">'+esc(String(p.name||'?').trim().charAt(0).toUpperCase())+'</div>';
 const badge=p.verified?'<svg class="vf" viewBox="0 0 24 24" width="0.8em" height="0.8em" fill="'+esc(p.verifiedColor)+'" aria-label="Verificado"><path d="M12 1.5l2.6 2.5 3.5-.6 1.1 3.4 3.2 1.6-1.3 3.6 1.3 3.6-3.2 1.6-1.1 3.4-3.5-.6L12 22.5l-2.6-2.6-3.5.6-1.1-3.4-3.2-1.6L2.9 12 1.6 8.4l3.2-1.6 1.1-3.4 3.5.6z"/><path fill="#ffffff" d="M10.7 15.2l-2.9-2.9 1.4-1.4 1.5 1.5 4.1-4.1 1.4 1.4z"/></svg>':'';
 const footBits=[];
 if(s.footer.text)footBits.push(esc(s.footer.text));
 if(s.footer.branding&&String(s.footer.brandText||'').trim())footBits.push(esc(s.footer.brandText));
 const foot=footBits.length?'<footer class="ft">'+footBits.join(' · ')+'</footer>':'';
 const socTop=d.socialPos==='top'?soc:'';
 const socBot=(d.socialPos==='bottom'&&soc)?'<div class="socbot'+rv+'">'+soc+'</div>':'';
 /* --- botón volver arriba (script generado sin cerrar el script del editor) --- */
 const topBtn=d.topBtn?'<a class="tp" id="lfTop" href="#" aria-label="Volver arriba">&#8593;</a>':'';
 let pjs='';
 if(d.topBtn)pjs+='(function(){var b=document.getElementById("lfTop");if(!b)return;function u(){b.classList.toggle("on",(window.scrollY||document.documentElement.scrollTop||0)>350)}window.addEventListener("scroll",u,{passive:true});u();b.addEventListener("click",function(e){e.preventDefault();if(window.scrollTo){try{window.scrollTo({top:0,behavior:"smooth"})}catch(x){window.scrollTo(0,0)}}else{document.documentElement.scrollTop=0}})})();';
 if(hasBn&&bn.fadeScroll)pjs+='(function(){var e=document.getElementById("lfBn");if(!e)return;function f(){var hh=e.offsetHeight||1;var y=window.scrollY||document.documentElement.scrollTop||0;e.style.opacity=Math.max(0,1-y/(hh*.9))}window.addEventListener("scroll",f,{passive:true});f()})();';
 const topScript=pjs?('<scr'+'ipt>'+pjs+'</scr'+'ipt>'):'';
 return `<!DOCTYPE html>

<meta property="og:description" content="${desc}">

${fav}${fontLink}
<style>
*{box-sizing:border-box}

${imgL}
.wrap{max-width:${b.width}px;margin:0 auto;padding:${hasBn?14:56}px 18px 48px;display:flex;flex-direction:column;align-items:center}
.head{display:flex;flex-direction:column;align-items:center;width:100%}
${hasBn?'.head{margin-top:-'+Math.round(p.avatarSize*.5)+'px}':''}
.bn{position:relative;width:100%;height:${bn.h||180}px;overflow:hidden;${bn.fade!==false?'-webkit-mask-image:linear-gradient(#000 62%,transparent);mask-image:linear-gradient(#000 62%,transparent);':''}}
.bn img{width:100%;height:100%;object-fit:cover;display:block}
.bno{position:absolute;inset:0;background:rgba(0,0,0,${(bn.overlay||0)/100})}
.av{width:${p.avatarSize}px;height:${p.avatarSize}px;border-radius:${ar};object-fit:cover;${p.avatarBorder?'border:'+p.avatarBorder+'px solid '+p.avatarBorderColor+';':''}box-shadow:0 6px 24px rgba(0,0,0,.18)}
.ph{display:flex;align-items:center;justify-content:center;font-size:${Math.round(p.avatarSize*.42)}px;font-weight:700;color:${d.titleColor};background:${hexA(d.titleColor,.14)}}
h1{margin:16px 0 0;font-size:24px;font-weight:700;color:${d.titleColor};display:flex;align-items:center;gap:7px;text-align:center}
.us{margin:4px 0 0;font-size:14px;opacity:.75}

.chips a:hover{background:${hexA(d.socialColor,.18)};transform:translateY(-1px)}
.links{width:100%;display:flex;flex-direction:column;gap:${b.gap}px;margin-top:26px}
.lk{position:relative;display:flex;align-items:center;justify-content:center;min-height:${b.height}px;padding:10px 52px;border-radius:${b.radius}px;font-weight:600;font-size:${b.fontSize}px;line-height:1.3;text-decoration:none;text-align:center;color:${b.text};transition:transform .18s ease,box-shadow .18s ease,filter .18s ease;word-break:break-word;${bs}}

.tp.on{opacity:1;pointer-events:auto;transform:translateY(0)}
@keyframes lfUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

@keyframes lfPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}

.reveal.an-pulse{animation:lfUp .55s cubic-bezier(.22,.7,.3,1) both,lfPulse 1.9s ease-in-out .9s infinite}
@keyframes lfShake{0%,86%,100%{transform:rotate(0)}89%{transform:rotate(1.7deg)}92%{transform:rotate(-1.7deg)}95%{transform:rotate(1deg)}98%{transform:rotate(-.6deg)}}
.an-shake{animation:lfShake 3.4s ease-in-out infinite}
.reveal.an-shake{animation:lfUp .55s cubic-bezier(.22,.7,.3,1) both,lfShake 3.4s ease-in-out .9s infinite}
@keyframes lfGlow{0%,100%{box-shadow:0 0 4px ${hexA(b.shadow,.4)}}50%{box-shadow:0 0 26px ${hexA(b.shadow,.9)}}}

const pv=$('#pv');
let pvScroll=0;
function renderPreview(){
 try{pvScroll=(pv.contentWindow&&pv.contentWindow.scrollY)||0}catch(e){pvScroll=0}
 const html=buildPage(S);
 if('srcdoc' in pv){pv.srcdoc=html}
 else{try{const doc=pv.contentDocument||pv.contentWindow.document;doc.open();doc.write(html);doc.close()}catch(e){}}
}
pv.addEventListener('load',()=>{try{pv.contentWindow.scrollTo(0,pvScroll)}catch(e){}});
/* ====== EXPORTAR / IMPORTAR / DATOS ====== */
function fileName(){let n=String(S.meta.filename||'').trim();if(!n)n='index.html';if(!/\.html?$/i.test(n))n+='.html';return n}
function dl(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.append(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),4000)}
function exportHTML(){backup();dl(new Blob([buildPage(S)],{type:'text/html'}),fileName());toast('HTML exportado: '+fileName())}
function fallbackCopy(t){const ta=document.createElement('textarea');ta.value=t;document.body.append(ta);ta.select();try{document.execCommand('copy');toast('HTML copiado ✓')}catch(e){alert('No se pudo copiar')}ta.remove()}
function copyHTML(){backup();const html=buildPage(S);if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(html).then(()=>toast('HTML copiado ✓')).catch(()=>fallbackCopy(html))}else{fallbackCopy(html)}}
function slugName(){return (String(S.profile.user||S.profile.name||'config').replace(/[^a-zA-Z0-9]+/g,'-').replace(/^-+|-+$/g,'').toLowerCase())||'config'}
function exportJSON(){backup();dl(new Blob([JSON.stringify(S,null,2)],{type:'application/json'}),'linkstudio-'+slugName()+'.json');toast('Configuración guardada ✓')}
function loadExample(){if(!confirm('¿Cargar el ejemplo de demostración? Se sustituirá lo que hay ahora.'))return;S=clone(DEFAULT);buildAll();renderPreview();save();toast('Ejemplo cargado ✓')}
function emptyAll(){if(!confirm('¿Vaciar todo? Se eliminarán perfil, enlaces y cuadrícula (el diseño se mantiene).'))return;
 const base=clone(DEFAULT);
 base.profile={name:'',user:'',bio:'',avatar:'',avatarShape:'circle',avatarSize:96,avatarBorder:0,avatarBorderColor:'#ffffff',verified:false,verifiedColor:'#3b82f6'};
 base.socials=[];base.items=[];base.footer.text='';base.meta.title='';base.meta.desc='';
 base.design=clone(S.design);
 S=base;buildAll();renderPreview();save();toast('Todo vaciado')}
function restoreBackup(){let j=null;try{j=localStorage.getItem(KEY+'_bak')}catch(e){}
 if(!j){alert('No hay ninguna copia de seguridad todavía. Se crea automáticamente cada vez que exportas.');return}
 if(!confirm('¿Restaurar la copia guardada en la última exportación?'))return;
 try{S=migrate(deepMerge(clone(DEFAULT),JSON.parse(j)));buildAll();renderPreview();save();toast('Copia restaurada ✓')}catch(e){alert('La copia de seguridad no es válida')}}
function toast(m){const t=el('div','toast',esc(m));document.body.append(t);requestAnimationFrame(()=>t.classList.add('on'));setTimeout(()=>{t.classList.remove('on');setTimeout(()=>t.remove(),300)},2000)}
$('#fileJson').addEventListener('change',e=>{const fl=e.target.files[0];if(!fl)return;const r=new FileReader();r.onload=()=>{try{S=migrate(deepMerge(clone(DEFAULT),JSON.parse(r.result)));buildAll();renderPreview();save();toast('Configuración importada ✓')}catch(err){alert('El archivo JSON no es válido')}};r.readAsText(fl);e.target.value=''});
/* ====== NAVEGACIÓN E INICIO ====== */
function setDev(m){$('#device').classList.toggle('desk',!m);$('#devM').classList.toggle('on',m);$('#devD').classList.toggle('on',!m)}
function bindUI(){
 document.querySelectorAll('.tabs button').forEach(bt=>bt.addEventListener('click',()=>{
  document.querySelectorAll('.tabs button').forEach(x=>x.classList.toggle('on',x===bt));
  document.querySelectorAll('.tab').forEach(sec=>sec.classList.toggle('on',sec.id==='tab-'+bt.dataset.tab));
 }));
 $('#devM').addEventListener('click',()=>setDev(true));
 $('#devD').addEventListener('click',()=>setDev(false));
 $('#btnHtml').addEventListener('click',exportHTML);
 $('#btnJson').addEventListener('click',exportJSON);
 $('#btnImport').addEventListener('click',()=>$('#fileJson').click());
 $('#btnTheme').addEventListener('click',()=>{applyTheme(THEME==='auto'?'light':(THEME==='light'?'dark':'auto'))});
 applyTheme(THEME);
}
function buildAll(){buildPerfil();buildEnlaces();buildDiseno();buildAjustes()}
function initAll(){
 try{bindPicker();bindUI();buildAll();renderPreview();window.__lfOK=true}
 catch(err){if(window.__lfShow)window.__lfShow(String(err&&err.stack||err));throw err}
}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',initAll)}else{initAll()}
</script>
</body>
</html>

<style>
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{margin:0;min-height:100vh;font-family:'Playfair Display',Georgia,serif;background:linear-gradient(180deg,#faf6ef,#f0e9dd) fixed;color:#57534e}

.wrap{max-width:600px;margin:0 auto;padding:56px 18px 48px;display:flex;flex-direction:column;align-items:center}
.head{display:flex;flex-direction:column;align-items:center;width:100%}

.bn{position:relative;width:100%;height:360px;overflow:hidden;-webkit-mask-image:linear-gradient(#000 62%,transparent);mask-image:linear-gradient(#000 62%,transparent);}
.bn img{width:100%;height:100%;object-fit:cover;display:block;object-position:center center}
.bno{position:absolute;inset:0;background:rgba(0,0,0,0.17)}
.av{width:96px;height:96px;border-radius:50%;object-fit:cover;margin-top:0px;box-shadow:0 6px 24px rgba(0,0,0,.18)}
.ph{display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:700;color:#1c1917;background:rgba(28,25,23,0.14)}
h1{margin:16px 0 0;font-size:24px;font-weight:700;color:#1c1917;display:flex;align-items:center;gap:7px;text-align:center}
.us{margin:4px 0 0;font-size:14px;opacity:.75}
.bio{margin:10px 0 0;font-size:15px;line-height:1.5;text-align:center;max-width:52ch;white-space:pre-line}
.soc{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:16px}
.soc a{color:#44403c;display:flex;transition:transform .15s ease}
.soc a:hover{transform:scale(1.18)}
.soc2{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:10px}
.soc2 a{color:#44403c;display:flex;transition:transform .15s ease}
.soc2 a:hover{transform:scale(1.18)}
.socbot{margin-top:28px}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px}
.chips a{padding:6px 14px;border-radius:999px;font-size:13px;font-weight:600;text-decoration:none;color:#44403c;border:1px solid rgba(68,64,60,0.4);background:rgba(68,64,60,0.08);transition:background .15s ease,transform .15s ease}
.chips a:hover{background:rgba(68,64,60,0.18);transform:translateY(-1px)}
.links{width:100%;display:flex;flex-direction:column;gap:14px;margin-top:26px}
.lk{position:relative;display:flex;align-items:center;justify-content:center;min-height:52px;padding:10px 52px;border-radius:12px;font-weight:600;font-size:16px;line-height:1.3;text-decoration:none;text-align:center;color:#1c1917;transition:transform .18s ease,box-shadow .18s ease,filter .18s ease;word-break:break-word;background:rgba(250,246,239,0.14);border:1px solid rgba(28,25,23,0.35);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.lk:active{transform:translateY(1px) scale(.99)}
.lk:hover{box-shadow:0 0 24px rgba(214,211,209,0.85)}
.ic{position:absolute;left:16px;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:8px;z-index:1}
.icr{position:absolute;right:16px;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:8px;z-index:1}
.tt{display:inline-flex;align-items:center;justify-content:center;gap:7px;flex-wrap:wrap}
.lkcov .ic,.lkcov .icr{color:#ffffff}
.th{position:absolute;left:7px;top:50%;transform:translateY(-50%);height:calc((100% - 14px)*1);aspect-ratio:1/1;object-fit:cover;border-radius:50%}
.lkcov .thbg,.lkcov .thov{border-radius:12px}
.thbg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.thov{position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.5),rgba(0,0,0,.22))}
.lkcov .tt{position:relative;z-index:1;color:#ffffff;text-shadow:0 1px 10px rgba(0,0,0,.55)}
.sec{margin:20px 0 0;font-size:13px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#1c1917;opacity:.8;scroll-margin-top:20px}
.gd{width:100%;display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.gi{display:flex;flex-direction:column;align-items:center;gap:8px;text-decoration:none;min-width:0}
.gic{position:relative;overflow:hidden;width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:22px;color:#1c1917;transition:transform .18s ease;background:rgba(250,246,239,0.14);border:1px solid rgba(28,25,23,0.35);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.gi:hover .gic{transform:scale(1.06)}
.gfull{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.gil{font-size:12.5px;font-weight:600;color:#57534e;text-align:center;word-break:break-word}
.ft{margin-top:40px;font-size:12px;opacity:.65;text-align:center}
#lfFx{position:fixed;inset:0;z-index:-1;pointer-events:none}
.gp{position:fixed;right:18px;bottom:70px;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(28,25,23,0.16);border:0;color:#1c1917;font-size:20px;cursor:pointer;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:5;transition:transform .15s ease}
.gp:hover{transform:scale(1.08)}
#lfGov{position:fixed;inset:0;background:rgba(4,6,10,.94);z-index:60;display:flex;align-items:center;justify-content:center;padding:12px}
.gwrap{display:flex;flex-direction:column;gap:10px;align-items:center}
.ghead{width:100%;display:flex;justify-content:space-between;align-items:center;color:#fff;font:700 14px ui-monospace,monospace}
.ghead button{background:#20242c;border:1px solid #3a4150;color:#fff;border-radius:8px;padding:4px 10px;cursor:pointer;font-size:14px}
#gc{background:#0a0d12;border:1px solid #333;border-radius:8px;max-width:88vw;max-height:64vh}
.gpads{display:flex;gap:10px}
.gpads button{width:56px;height:46px;font-size:18px;background:#1a1f27;color:#fff;border:1px solid #394050;border-radius:10px;cursor:pointer}
[data-tip]{position:relative}
[data-tip]::after{content:attr(data-tip);position:absolute;left:50%;bottom:calc(100% + 8px);transform:translateX(-50%) translateY(4px);background:rgba(10,12,16,.92);color:#fff;font-size:12.5px;font-weight:500;line-height:1.4;padding:7px 11px;border-radius:8px;white-space:normal;width:max-content;max-width:240px;text-align:center;opacity:0;pointer-events:none;transition:opacity .15s ease,transform .15s ease;z-index:9}
[data-tip]::before{content:'';position:absolute;left:50%;bottom:calc(100% + 2px);transform:translateX(-50%);border:6px solid transparent;border-top-color:rgba(10,12,16,.92);opacity:0;transition:opacity .15s;z-index:9;pointer-events:none}
[data-tip]:hover::after,[data-tip].tipon::after,[data-tip]:hover::before,[data-tip].tipon::before{opacity:1}
[data-tip]:hover::after,[data-tip].tipon::after{transform:translateX(-50%) translateY(0)}
.tp{position:fixed;right:18px;bottom:18px;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(28,25,23,0.16);color:#1c1917;font-size:20px;text-decoration:none;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .25s ease,transform .25s ease;transform:translateY(8px);z-index:5}
.tp.on{opacity:1;pointer-events:auto;transform:translateY(0)}
@keyframes lfUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.reveal{animation:lfUp .55s cubic-bezier(.22,.7,.3,1) both}
@keyframes lfPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.an-pulse{animation:lfPulse 1.9s ease-in-out infinite}
.reveal.an-pulse{animation:lfUp .55s cubic-bezier(.22,.7,.3,1) both,lfPulse 1.9s ease-in-out .9s infinite}
@keyframes lfShake{0%,86%,100%{transform:rotate(0)}89%{transform:rotate(1.7deg)}92%{transform:rotate(-1.7deg)}95%{transform:rotate(1deg)}98%{transform:rotate(-.6deg)}}
.an-shake{animation:lfShake 3.4s ease-in-out infinite}
.reveal.an-shake{animation:lfUp .55s cubic-bezier(.22,.7,.3,1) both,lfShake 3.4s ease-in-out .9s infinite}
@keyframes lfGlow{0%,100%{box-shadow:0 0 4px rgba(214,211,209,0.4)}50%{box-shadow:0 0 26px rgba(214,211,209,0.9)}}
.an-glow{animation:lfGlow 2.1s ease-in-out infinite}
.reveal.an-glow{animation:lfUp .55s cubic-bezier(.22,.7,.3,1) both,lfGlow 2.1s ease-in-out .9s infinite}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}.reveal,.an-pulse,.an-shake,.an-glow{animation:none}}
</style>
</head>
